{% extends "base.html" %}
{% block content %}
<h2>Schedule Interview</h2>
<p>For: {{ application.student.name }} - {{ application.job.title }}</p>
<form method="POST">
    <div class="mb-3">
        <label>Date & Time</label>
        <input type="datetime-local" name="datetime" class="form-control" required>
    </div>
    <div class="mb-3">
        <label>Meeting Link (Google Meet/Zoom)</label>
        <input type="url" name="meeting_link" class="form-control" placeholder="https://meet.google.com/...">
    </div>
    <button type="submit" class="btn btn-primary">Schedule</button>
    <a href="{{ url_for('admin_applications') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
